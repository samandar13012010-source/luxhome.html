var SU="https://yaprjjishzefecbztdtn.supabase.co",SK="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlhcHJqamlzaHplZmVjYnp0ZHRuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MDgwMTMsImV4cCI6MjA5NTA4NDAxM30.f4-fsuVLhZXSLYVLjPSLqLYoGZecPrDPI2s84SlXf_g";
var tok=localStorage.getItem("lh_tok")||"",prods=[],cart=[],eId=null;
async function doLogin(){var e=document.getElementById("lE").value.trim(),p=document.getElementById("lP").value;document.getElementById("lErr").textContent="";try{var r=await fetch(SU+"/auth/v1/token?grant_type=password",{method:"POST",headers:{"Content-Type":"application/json","apikey":SK},body:JSON.stringify({email:e,password:p})});var d=await r.json();if(d.access_token){tok=d.access_token;localStorage.setItem("lh_tok",tok);localStorage.setItem("lh_em",e);sApp();}else document.getElementById("lErr").textContent="Email yoki parol notogri!";}catch(e){document.getElementById("lErr").textContent="Xatolik!";}}
function doLogout(){localStorage.removeItem("lh_tok");localStorage.removeItem("lh_em");tok="";document.getElementById("AW").style.display="none";document.getElementById("LW").style.display="flex";document.getElementById("lP").value="";}
function sApp(){document.getElementById("LW").style.display="none";document.getElementById("AW").style.display="block";document.getElementById("uE").textContent=localStorage.getItem("lh_em")||"";lP();}
async function api(m,p,b){var h={"Content-Type":"application/json","apikey":SK,"Authorization":"Bearer "+tok};if(m==="POST")h["Prefer"]="return=representation";var r=await fetch(SU+"/rest/v1/"+p,{method:m,headers:h,body:b?JSON.stringify(b):undefined});if(m==="DELETE"||m==="PATCH")return;return r.json();}
async function lP(){var d=await api("GET","products?select=*&order=created_at.desc");prods=Array.isArray(d)?d:[];rS();rCF();rT();rSG();lTS();}
function fmt(n){return Number(n).toLocaleString()+" som";}
function st(q){if(q===0)return"<span class='bk out'>Tugagan</span>";if(q<=5)return"<span class='bk lw2'>Kam qoldi</span>";return"<span class='bk ok'>Yetarli</span>";}
function filterStat(t){var tb=document.getElementById("tB");var rows=t==="low"?prods.filter(p=>p.qty>0&&p.qty<=5):t==="out"?prods.filter(p=>p.qty===0):prods;document.getElementById("sI").value="";document.getElementById("fC").value="";if(!rows.length){tb.innerHTML="<tr><td colspan='6' class='em'>Mahsulot topilmadi</td></tr>";return;}tb.innerHTML=rows.map(p=>"<tr><td><strong>"+p.name+"</strong></td><td>"+p.cat+"</td><td>"+p.qty+" dona</td><td>"+fmt(p.price)+"</td><td>"+st(p.qty)+"</td><td><button class='ab' onclick='oM("+p.id+")'>Tahrir</button><button class='ab dl' onclick='dP("+p.id+")'>Ochir</button></td></tr>").join("");}function rS(){var t=prods.length,l=prods.filter(p=>p.qty>0&&p.qty<=5).length,o=prods.filter(p=>p.qty===0).length,c=[...new Set(prods.map(p=>p.cat))].length;document.getElementById("sRow").innerHTML="<div class='st' onclick='filterStat(\"all\")' style='cursor:pointer'><div class='n'>"+t+"</div><div class='l'>Jami mahsulot</div></div><div class='st'><div class='n'>"+c+"</div><div class='l'>Kategoriyalar</div></div><div class='st' onclick='filterStat(\"low\")' style='cursor:pointer'><div class='n'>"+l+"</div><div class='l'>Kam qolgan</div></div><div class='st' onclick='filterStat(\"out\")' style='cursor:pointer'><div class='n'>"+o+"</div><div class='l'>Tugagan</div></div>";}
function rCF(){var s=document.getElementById("fC"),cur=s.value,cats=[...new Set(prods.map(p=>p.cat))];s.innerHTML="<option value=''>Barcha kategoriyalar</option>"+cats.map(c=>"<option"+(c===cur?" selected":"")+">"+c+"</option>").join("");}
function rT(){var q=document.getElementById("sI").value.toLowerCase(),cat=document.getElementById("fC").value,rows=prods.filter(p=>(!q||p.name.toLowerCase().includes(q))&&(!cat||p.cat===cat)),tb=document.getElementById("tB");if(!rows.length){tb.innerHTML="<tr><td colspan='6' class='em'>Mahsulot topilmadi</td></tr>";return;}tb.innerHTML=rows.map(p=>"<tr><td><strong>"+p.name+"</strong></td><td>"+p.cat+"</td><td>"+p.qty+" dona</td><td>"+fmt(p.price)+"</td><td>"+st(p.qty)+"</td><td><button class='ab' onclick='oM("+p.id+")'>Tahrir</button><button class='ab dl' onclick='dP("+p.id+")'>Ochir</button></td></tr>").join("");}
function oM(id){eId=id||null;document.getElementById("mT").textContent=id?"Tahrirlash":"Yangi mahsulot";if(id){var p=prods.find(x=>x.id===id);document.getElementById("fN").value=p.name;document.getElementById("fCa").value=p.cat;document.getElementById("fQ").value=p.qty;document.getElementById("fPr").value=p.price;}else{document.getElementById("fN").value="";document.getElementById("fQ").value="";document.getElementById("fPr").value="";}document.getElementById("mOv").style.display="flex";}
function cM(){document.getElementById("mOv").style.display="none";}
function omC(e){if(e.target===document.getElementById("mOv"))cM();}
async function sP(){var name=document.getElementById("fN").value.trim(),cat=document.getElementById("fCa").value,qty=parseInt(document.getElementById("fQ").value)||0,price=parseInt(document.getElementById("fPr").value)||0;if(!name)return;if(eId){await api("PATCH","products?id=eq."+eId,{name,cat,qty,price});}else{await api("POST","products",{name,cat,qty,price});}cM();await lP();}
async function dP(id){if(!confirm("Ochirilsinmi?"))return;await api("DELETE","products?id=eq."+id);await lP();}
function rSG(){var q=document.getElementById("sQ").value.toLowerCase(),rows=prods.filter(p=>p.qty>0&&(!q||p.name.toLowerCase().includes(q))),g=document.getElementById("sG");if(!rows.length){g.innerHTML="<div class='em' style='grid-column:1/-1'>Mahsulot yoq</div>";return;}g.innerHTML=rows.map(p=>"<div class='sc' onclick='aC("+p.id+")'><div class='sn'>"+p.name+"</div><div class='scat'>"+p.cat+"</div><div class='sp'>"+fmt(p.price)+"</div><div class='sq'>Qoldi: "+p.qty+" dona</div></div>").join("");}
function aC(id){var p=prods.find(x=>x.id===id);if(!p||p.qty<=0)return;var ci=cart.find(x=>x.id===id);if(ci){if(ci.qty>=p.qty)return;ci.qty++;}else cart.push({id:p.id,name:p.name,price:p.price,qty:1,max:p.qty});rC();}
function chQ(id,d){var ci=cart.find(x=>x.id===id);if(!ci)return;ci.qty+=d;if(ci.qty<=0)cart=cart.filter(x=>x.id!==id);rC();}
function sQ2(id,v){var ci=cart.find(x=>x.id===id);if(!ci)return;var p=prods.find(x=>x.id===id);ci.qty=Math.min(Math.max(1,parseInt(v)||1),p?p.qty:999);rC();}
function rC(){var w=document.getElementById("cW");if(!cart.length){w.style.display="none";return;}w.style.display="block";var total=cart.reduce((s,i)=>s+i.price*i.qty,0);document.getElementById("cI").innerHTML=cart.map(ci=>"<div class='ci'><span class='cn'>"+ci.name+"</span><div class='cq'><button class='qb' onclick='chQ("+ci.id+",-1)'>-</button><input type='number' class='qi' value='"+ci.qty+"' onchange='sQ2("+ci.id+",this.value)'><button class='qb' onclick='chQ("+ci.id+",1)'>+</button></div><span class='cp'>"+fmt(ci.price*ci.qty)+"</span></div>").join("");document.getElementById("cT").textContent=fmt(total);}
function oChek(){if(!cart.length)return;var total=cart.reduce((s,i)=>s+i.price*i.qty,0),now=new Date(),ds=now.toLocaleDateString("uz-UZ")+" "+now.toLocaleTimeString("uz-UZ",{hour:"2-digit",minute:"2-digit"});document.getElementById("chC").innerHTML="<div class='chlo'>LUX<span>HOME</span></div><div class='chd'>"+ds+"</div><hr class='chdv'>"+cart.map(ci=>"<div class='chr'><span>"+ci.name+" x"+ci.qty+"</span><span>"+fmt(ci.price*ci.qty)+"</span></div>").join("")+"<hr class='chdv'><div class='cht'><span>JAMI:</span><span>"+fmt(total)+"</span></div><hr class='chdv'><div style='text-align:center;font-size:11px;color:var(--muted);margin-top:.5rem'>Rahmat! Qayta keling!</div>";document.getElementById("chOv").style.display="flex";cSale(total);}
async function cSale(total){var items=cart.map(ci=>({id:ci.id,name:ci.name,qty:ci.qty,price:ci.price}));await api("POST","sales",{items:JSON.stringify(items),total});for(var ci of cart){var p=prods.find(x=>x.id===ci.id);if(p)await api("PATCH","products?id=eq."+ci.id,{qty:p.qty-ci.qty});}cart=[];await lP();}
function cCh(){document.getElementById("chOv").style.display="none";}
function cchC(e){if(e.target===document.getElementById("chOv"))cCh();}
async function lTS(){var today=new Date().toISOString().split("T")[0];var d=await api("GET","sales?created_at=gte."+today+"T00:00:00&select=total");if(Array.isArray(d)){document.getElementById("sS").textContent=d.length;document.getElementById("sSm").textContent=d.reduce((s,x)=>s+(x.total||0),0).toLocaleString();}}
async function lTar(){var d=await api("GET","sales?select=*&order=created_at.desc&limit=50"),el=document.getElementById("tL");if(!Array.isArray(d)||!d.length){el.innerHTML="<div class='em'>Sotuv tarixi yoq</div>";return;}el.innerHTML=d.map(s=>{var items=[];try{items=JSON.parse(s.items);}catch(e){}var dt=new Date(s.created_at),ds=dt.toLocaleDateString("uz-UZ")+" "+dt.toLocaleTimeString("uz-UZ",{hour:"2-digit",minute:"2-digit"});return"<div class='ti'><div class='th'><span class='td'>"+ds+"</span><span class='tt'>"+fmt(s.total)+"</span></div><div class='tit'>"+items.map(i=>i.name+" x"+i.qty).join(", ")+"</div></div>";}).join("");}
var _chart=null;
async function lAn(){var now=new Date(),fd=new Date(now.getFullYear(),now.getMonth(),1).toISOString();var d=await api("GET","sales?created_at=gte."+fd+"&select=*&order=created_at.asc");if(!Array.isArray(d)||!d.length){document.getElementById("aSt").textContent="0";document.getElementById("aSm").textContent="0";document.getElementById("aTv").textContent="0";document.getElementById("aOr").textContent="0";document.getElementById("topT").innerHTML="<div class='em'>Sotuv yoq</div>";return;}var tot=d.reduce((s,x)=>s+(x.total||0),0),tq=0,tm={},km={};d.forEach(s=>{var it=[];try{it=JSON.parse(s.items);}catch(e){}it.forEach(i=>{tq+=i.qty;tm[i.name]=(tm[i.name]||0)+i.qty;});var k=new Date(s.created_at).getDate();km[k]=(km[k]||0)+(s.total||0);});document.getElementById("aSt").textContent=d.length;document.getElementById("aSm").textContent=tot.toLocaleString();document.getElementById("aTv").textContent=tq;document.getElementById("aOr").textContent=Math.round(tot/d.length).toLocaleString();var sorted=Object.entries(tm).sort((a,b)=>b[1]-a[1]).slice(0,8);document.getElementById("topT").innerHTML=sorted.map((t,i)=>"<div class='ci'><span class='cn'>"+(i+1)+". "+t[0]+"</span><span class='cp'>"+t[1]+" dona</span></div>").join("");var days=new Date(now.getFullYear(),now.getMonth()+1,0).getDate(),labels=[],data=[];for(var i=1;i<=days;i++){labels.push(i+"");data.push(km[i]||0);}var ctx=document.getElementById("sCh").getContext("2d");if(_chart)_chart.destroy();_chart=new Chart(ctx,{type:"bar",data:{labels:labels,datasets:[{label:"Som",data:data,backgroundColor:"rgba(201,150,58,0.6)",borderColor:"#C9963A",borderWidth:1}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:"#9A8E75",font:{size:10}},grid:{color:"#2e2918"}},y:{ticks:{color:"#9A8E75",font:{size:10}},grid:{color:"#2e2918"}}}}});}
document.addEventListener("keydown",function(e){if(e.key==="Escape"){cM();cCh();}if(e.key==="Enter"&&document.getElementById("LW").style.display!=="none")doLogin();});
function sp(id,btn){document.querySelectorAll(".pg").forEach(p=>p.classList.remove("active"));document.querySelectorAll(".nb").forEach(b=>b.classList.remove("active"));document.getElementById(id).classList.add("active");btn.classList.add("active");if(id==="sotuv")rSG();if(id==="tarix")lTar();if(id==="analitika")lAn();}
