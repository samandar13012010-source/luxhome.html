<!DOCTYPE html><html lang="uz"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>LuxHome</title><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"><link rel="manifest" href="/manifest.json"><meta name="mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-title" content="LuxHome"><style>:root{--gold:#C9963A;--gold-light:#E8C97A;--dark:#0F0D08;--dark2:#1A1710;--dark3:#252118;--cream:#F5EDD8;--text:#F0E6CE;--text-muted:#9A8E75;--red:#C94040;--radius:10px;--font-display:'Cormorant Garamond',serif;--font-body:'DM Sans',sans-serif}*{box-sizing:border-box;margin:0;padding:0}body{font-family:var(--font-body);background:var(--dark);color:var(--text);min-height:100vh}nav{display:flex;justify-content:space-between;align-items:center;padding:0 1.5rem;height:58px;background:var(--dark2);border-bottom:1px solid #2e2918;position:sticky;top:0;z-index:50}.logo{font-family:var(--font-display);font-size:22px;font-weight:600;color:var(--cream);letter-spacing:3px}.logo span{color:var(--gold)}.nav-links{display:flex;gap:4px}.nav-btn{background:transparent;border:none;font-family:var(--font-body);font-size:13px;color:var(--text-muted);padding:7px 16px;border-radius:8px;cursor:pointer;transition:all .2s}.nav-btn.active{color:var(--gold);background:rgba(201,150,58,.12)}.page{display:none;padding:1.25rem;max-width:960px;margin:0 auto}.page.active{display:block}.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.25rem}@media(max-width:600px){.stats-row{grid-template-columns:repeat(2,1fr)}}.stat{background:var(--dark2);border:1px solid #2e2918;border-radius:var(--radius);padding:1rem;text-align:center}.stat .n{font-family:var(--font-display);font-size:28px;color:var(--gold);font-weight:500}.stat .l{font-size:11px;color:var(--text-muted);margin-top:3px}.toolbar{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}.toolbar input,.toolbar select{font-family:var(--font-body);font-size:13px;padding:8px 12px;background:var(--dark2);color:var(--text);border:1px solid #2e2918;border-radius:8px;outline:none}.toolbar input{flex:1;min-width:160px}.btn-add{background:var(--gold);color:var(--dark);border:none;border-radius:8px;padding:8px 18px;font-size:13px;font-weight:500;font-family:var(--font-body);cursor:pointer;white-space:nowrap}.tbl-wrap{border:1px solid #2e2918;border-radius:var(--radius);overflow:hidden;overflow-x:auto}table{width:100%;border-collapse:collapse;font-size:13px;min-width:520px}thead{background:var(--dark3)}th{padding:10px 14px;text-align:left;font-size:11px;font-weight:500;color:var(--text-muted);letter-spacing:.8px;text-transform:uppercase}td{padding:11px 14px;color:var(--text);border-top:1px solid #1e1c13}.badge{display:inline-block;font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px}.ok{background:rgba(90,140,58,.18);color:#8BC462;border:1px solid rgba(90,140,58,.3)}.low{background:rgba(201,122,48,.18);color:#E09850;border:1px solid rgba(201,122,48,.3)}.out{background:rgba(201,64,64,.18);color:#E07070;border:1px solid rgba(201,64,64,.3)}.action-btn{background:transparent;border:1px solid #2e2918;border-radius:7px;padding:5px 10px;font-size:12px;cursor:pointer;color:var(--text-muted);font-family:var(--font-body);margin-left:4px}.action-btn:hover{border-color:var(--gold);color:var(--gold)}.action-btn.del:hover{border-color:var(--red);color:#E07070}.empty{text-align:center;padding:2.5rem;color:var(--text-muted);font-size:13px}.loading{text-align:center;padding:2rem;color:var(--gold);font-size:13px}.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem}.modal{background:var(--dark2);border:1px solid #3a3320;border-radius:14px;padding:1.75rem;width:100%;max-width:360px}.modal h3{font-family:var(--font-display);font-size:20px;color:var(--cream);margin-bottom:1.25rem;font-weight:500}.field{margin-bottom:1rem}.field label{display:block;font-size:11px;color:var(--text-muted);letter-spacing:.5px;margin-bottom:5px;text-transform:uppercase}.field input,.field select{width:100%;font-family:var(--font-body);font-size:14px;padding:9px 12px;background:var(--dark3);color:var(--text);border:1px solid #2e2918;border-radius:8px;outline:none}.modal-btns{display:flex;gap:8px;margin-top:1.25rem}.btn-save{flex:1;background:var(--gold);color:var(--dark);border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:500;font-family:var(--font-body);cursor:pointer}.btn-cancel{flex:1;background:transparent;color:var(--text-muted);border:1px solid #2e2918;border-radius:8px;padding:10px;font-size:13px;font-family:var(--font-body);cursor:pointer}@media(max-width:480px){.logo{font-size:18px}.nav-btn{padding:6px 10px;font-size:12px}.page{padding:1rem}}</style></head><body>
<nav><div class="logo">LUX<span>HOME</span></div><div class="nav-links"><button class="nav-btn active" onclick="showPage('mahsulot',this)">Mahsulotlar</button></div></nav>
<div id="mahsulot" class="page active"><div class="stats-row" id="statsRow"><div class="stat"><div class="n">...</div><div class="l">Yuklanmoqda</div></div></div><div class="toolbar"><input type="text" id="searchInput" placeholder="Mahsulot qidirish..." oninput="renderTable()"><select id="filterCat" onchange="renderTable()"><option value="">Barcha kategoriyalar</option></select><button class="btn-add" onclick="openModal()">+ Qoshish</button></div><div class="tbl-wrap"><table><thead><tr><th>Nomi</th><th>Kategoriya</th><th>Miqdor</th><th>Narx</th><th>Holat</th><th>Amallar</th></tr></thead><tbody id="tbody"><tr><td colspan="6" class="loading">Yuklanmoqda...</td></tr></tbody></table></div></div>
<div class="overlay" id="overlay" style="display:none" onclick="overlayClick(event)"><div class="modal"><h3 id="modalTitle">Yangi mahsulot</h3><div class="field"><label>Nomi</label><input id="fName" placeholder="Mahsulot nomini kiriting"></div><div class="field"><label>Kategoriya</label><select id="fCat"><option>Mebel</option><option>Yoruglik</option><option>Pardalar</option><option>Dekor</option><option>Oshxona</option><option>Boshqa</option></select></div><div class="field"><label>Miqdor (dona)</label><input id="fQty" type="number" min="0" placeholder="0"></div><div class="field"><label>Narx (som)</label><input id="fPrice" type="number" min="0" placeholder="0"></div><div class="modal-btns"><button class="btn-cancel" onclick="closeModal()">Bekor</button><button class="btn-save" onclick="saveProduct()">Saqlash</button></div></div></div>
<script>
var URL='https://yaprjjishzefecbztdtn.supabase.co';
var KEY='sb_publishable_ItzhkiCrM6ZhHSyEZLjYEg_Jc8L2pQj';
var products=[],editId=null;

async function api(method,path,body){
  var r=await fetch(URL+'/rest/v1/'+path,{
    method:method,
    headers:{'Content-Type':'application/json','apikey':KEY,'Authorization':'Bearer '+KEY,'Prefer':method==='POST'?'return=representation':''},
    body:body?JSON.stringify(body):undefined
  });
  if(method==='DELETE')return;
  return r.json();
}

async function loadProducts(){
  var data=await api('GET','products?select=*&order=created_at.desc');
  products=data||[];
  renderStats();renderCatFilter();renderTable();
}

function fmt(n){return Number(n).toLocaleString()+' som';}
function st(q){if(q===0)return'<span class="badge out">Tugagan</span>';if(q<=5)return'<span class="badge low">Kam qoldi</span>';return'<span class="badge ok">Yetarli</span>';}

function renderStats(){
  var t=products.length,l=products.filter(p=>p.qty>0&&p.qty<=5).length,o=products.filter(p=>p.qty===0).length,c=[...new Set(products.map(p=>p.cat))].length;
  document.getElementById('statsRow').innerHTML='<div class="stat"><div class="n">'+t+'</div><div class="l">Jami mahsulot</div></div><div class="stat"><div class="n">'+c+'</div><div class="l">Kategoriyalar</div></div><div class="stat"><div class="n">'+l+'</div><div class="l">Kam qolgan</div></div><div class="stat"><div class="n">'+o+'</div><div class="l">Tugagan</div></div>';
}

function renderCatFilter(){
  var s=document.getElementById('filterCat'),cur=s.value,cats=[...new Set(products.map(p=>p.cat))];
  s.innerHTML='<option value="">Barcha kategoriyalar</option>'+cats.map(c=>'<option'+(c===cur?' selected':'')+'>'+c+'</option>').join('');
}

function renderTable(){
  var q=document.getElementById('searchInput').value.toLowerCase(),cat=document.getElementById('filterCat').value;
  var rows=products.filter(p=>(!q||p.name.toLowerCase().includes(q))&&(!cat||p.cat===cat));
  var tb=document.getElementById('tbody');
  if(!rows.length){tb.innerHTML='<tr><td colspan="6" class="empty">Mahsulot topilmadi</td></tr>';return;}
  tb.innerHTML=rows.map(p=>'<tr><td><strong>'+p.name+'</strong></td><td>'+p.cat+'</td><td>'+p.qty+' dona</td><td>'+fmt(p.price)+'</td><td>'+st(p.qty)+'</td><td><button class="action-btn" onclick="openModal('+p.id+')">Tahrir</button><button class="action-btn del" onclick="deleteProduct('+p.id+')">Ochir</button></td></tr>').join('');
}

function openModal(id){
  editId=id||null;
  document.getElementById('modalTitle').textContent=id?'Mahsulotni tahrirlash':'Yangi mahsulot';
  if(id){var p=products.find(x=>x.id===id);document.getElementById('fName').value=p.name;document.getElementById('fCat').value=p.cat;document.getElementById('fQty').value=p.qty;document.getElementById('fPrice').value=p.price;}
  else{document.getElementById('fName').value='';document.getElementById('fQty').value='';document.getElementById('fPrice').value='';}
  document.getElementById('overlay').style.display='flex';
  setTimeout(()=>document.getElementById('fName').focus(),100);
}
function closeModal(){document.getElementById('overlay').style.display='none';}
function overlayClick(e){if(e.target===document.getElementById('overlay'))closeModal();}

async function saveProduct(){
  var name=document.getElementById('fName').value.trim(),cat=document.getElementById('fCat').value,qty=parseInt(document.getElementById('fQty').value)||0,price=parseInt(document.getElementById('fPrice').value)||0;
  if(!name)return;
  if(editId){await api('PATCH','products?id=eq.'+editId,{name,cat,qty,price});}
  else{await api('POST','products',{name,cat,qty,price});}
  closeModal();await loadProducts();
}

async function deleteProduct(id){
  if(!confirm('Ochirilsinmi?'))return;
  await api('DELETE','products?id=eq.'+id);
  await loadProducts();
}

document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();if(e.key==='Enter'&&document.getElementById('overlay').style.display==='flex')saveProduct();});
function showPage(id,btn){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));document.getElementById(id).classList.add('active');btn.classList.add('active');}

loadProducts();
if('serviceWorker'in navigator)navigator.serviceWorker.register('/sw.js');
</script></body></html>
