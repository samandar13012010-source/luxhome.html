dding:1rem;margin-bottom:.75rem}.tarix-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem}.tarix-date{font-size:12px;color:var(--text-muted)}.tarix-total{font-size:15px;color:var(--gold);font-weight:500}.tarix-items{font-size:12px;color:var(--text-muted);line-height:1.8}@media(max-width:480px){.logo{font-size:18px}.nav-btn{padding:6px 8px;font-size:11px}.page{padding:1rem}}@media print{nav,.modal-btns{display:none!important}.overlay{position:static;background:none}.modal{border:none;padding:0;max-height:none}}</style></head><body><div class="login-wrap" id="loginWrap"><div class="login-box"><div class="login-logo">LUX<span>HOME</span></div><div class="login-sub">Sklad boshqaruv tizimi</div><div class="field"><label>Email</label><input type="email" id="lEmail" value="admin@luxhome.uz"></div><div class="field"><label>Parol</label><input type="password" id="lPass" placeholder="Parolni kiriting"></div><button class="btn-login" onclick="doLogin()">Kirish</button><div class="login-err" id="loginErr"></div></div></div><div id="appWrap" style="display:none"><nav><div class="logo">LUX<span>HOME</span></div><div class="nav-links"><button class="nav-btn active" onclick="showPage('mahsulot',this)">Mahsulotlar</button><button class="nav-btn" onclick="showPage('sotuv',this)">Sotuv</button><button class="nav-btn" onclick="showPage('tarix',this)">Tarix</button></div><div class="nav-right"><span style="font-size:12px;color:var(--text-muted)" id="userEmail"></span><button class="btn-logout" onclick="doLogout()">Chiqish</button></div></nav><div id="mahsulot" class="page active"><div class="stats-row" id="statsRow"></div><div class="toolbar"><input type="text" id="searchInput" placeholder="Mahsulot qidirish..." oninput="renderTable()"><select id="filterCat" onchange="renderTable()"><option value="">Barcha kategoriyalar</option></select><button class="btn-add" onclick="openModal()">+ Qoshish</button></div><div class="tbl-wrap"><table><thead><tr><th> s="overlay" id="chekOverlay" style="display:none" onclick="chekClick(event)"><div class="modal"><div id="chekContent"></div><div class="modal-btns"><button class="btn-cancel" onclick="closeChek()">Yopish</button></div></div></div><script>var SURL="https://yaprjjishzefecbztdtn.supabase.co",SKEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlhcHJqamlzaHplZmVjYnp0ZHRuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MDgwMTMsImV4cCI6MjA5NTA4NDAxM30.f4-fsuVLhZXSLYVLjPSLqLYoGZecPrDPI2s84SlXf_g",token=localStorage.getItem("lh_token")||"",products=[],cart=[],editId=null;async function doLogin(){var e=document.getElementById("lEmail").value.trim(),p=document.getElementById("lPass").value;document.getElementById("loginErr").textContent="";try{var r=await fetch(SURL+"/auth/v1/token?grant_type=password",{method:"POST",headers:{"Content-Type":"application/json","apikey":SKEY},body:JSON.stringify({email:e,password:p})});var d=await r.json();if(d.access_token){token=d.access_token;localStorage.setItem("lh_token",token);localStorage.setItem("lh_email",e);showApp();}else{document.getElementById("loginErr").textContent="Email yoki parol notogri!";}}catch(e){document.getElementById("loginErr").textContent="Xatolik!";}}function doLogout(){localStorage.removeItem("lh_token");localStorage.removeItem("lh_email");token="";document.getElementById("appWrap").style.display="none";document.getElementById("loginWrap").style.display="flex";document.getElementById("lPass").value="";}function showApp(){document.getElementById("loginWrap").style.display="none";document.getElementById("appWrap").style.display="block";document.getElementById("userEmail").textContent=localStorage.getItem("lh_email")||"";loadProducts();}async function api(m,p,b){var h={"Content-Type":"application/json","apikey":SKEY,"Authorization":"Bearer "+token};if(m==="POST")h["Prefer"]="return=representation";var r=await fetch(SURL+"/rest/v1/"+p,{method:m,headers:h,body:b?JSON.stringify(b):undefined});if(m==="DELETE"||m==="PATCH")return;return r.json();}async function loadProducts(){var d=await api("GET","products?select=*&order=created_at.desc");products=Array.isArray(d)?d:[];renderStats();renderCatFilter();renderTable();renderSotuvGrid();loadTodayStats();}function fmt(n){return Number(n).toLocaleString()+" som";}function st(q){if(q===0)return"<span class='badge out'>Tugagan</span>";if(q<=5)return"<span class='badge low'>Kam qoldi</span>";return"<span class='badge ok'>Yetarli</span>";}function renderStats(){var t=products.length,l=products.filter(p=>p.qty>0&&p.qty<=5).length,o=products.filter(p=>p.qty===0).length,c=[...new Set(products.map(p=>p.cat))].length;document.getElementById("statsRow").innerHTML="<div class='stat'><div class='n'>"+t+"</div><div class='l'>Jami mahsulot</div></div><div class='stat'><div class='n'>"+c+"</div><div class='l'>Kategoriyalar</div></div><div class='stat'><div class='n'>"+l+"</div><div class='l'>Kam qolgan</div></div><div class='stat'><div class='n'>"+o+"</div><div class='l'>Tugagan</div></div>";}function renderCatFilter(){var s=document.getElementById("filterCat"),cur=s.value,cats=[...new Set(products.map(p=>p.cat))];s.innerHTML="<option value=''>Barcha kategoriyalar</option>"+cats.map(c=>"<option"+(c===cur?" selected":"")+">"+c+"</option>").join("");}function renderTable(){var q=document.getElementById("searchInput").value.toLowerCase(),cat=document.getElementById("filterCat").value,rows=products.filter(p=>(!q||p.name.toLowerCase().includes(q))&&(!cat||p.cat===cat)),tb=document.getElementById("tbody");if(!rows.length){tb.innerHTML="<tr><td colspan='6' class='empty'>Mahsulot topilmadi</td></tr>";return;}tb.innerHTML=rows.map(p=>"<tr><td><strong>"+p.name+"</strong></td><td>"+p.cat+"</td><td>"+p.qty+" dona</td><td>"+fmt(p.price)+"</td><td>"+st(p.qty)+"</td><td><button class='action-btn' onclick='openModal("+p.id+")'>Tahrir</button><button class='action-btn del' onclick='deleteProduct("+p.id+")'>Ochir</button></td></tr>").join("");}function openModal(id){editId=id||null;document.getElementById("modalTitle").textContent=id?"Mahsulotni tahrirlash":"Yangi mahsulot";if(id){var p=products.find(x=>x.id===id);document.getElementById("fName").value=p.name;document.getElementById("fCat").value=p.cat;document.getElementById("fQty").value=p.qty;document.getElementById("fPrice").value=p.price;}else{document.getElementById("fName").value="";document.getElementById("fQty").value="";document.getElementById("fPrice").value="";}document.getElementById("overlay").style.display="flex";}function closeModal(){document.getElementById("overlay").style.display="none";}function overlayClick(e){if(e.target===document.getElementById("overlay"))closeModal();}async function saveProduct(){var name=document.getElementById("fName").value.trim(),cat=document.getElementById("fCat").value,qty=parseInt(document.getElementById("fQty").value)||0,price=parseInt(document.getElementById("fPrice").value)||0;if(!name)return;if(editId){await api("PATCH","products?id=eq."+editId,{name,cat,qty,price});}else{await api("POST","products",{name,cat,qty,price});}closeModal();await loadProducts();}async function deleteProduct(id){if(!confirm("Ochirilsinmi?"))return;await api("DELETE","products?id=eq."+id);await loadProducts();}function renderSotuvGrid(){var q=document.getElementById("sotuvSearch").value.toLowerCase(),rows=products.filter(p=>p.qty>0&&(!q||p.name.toLowerCase().includes(q))),g=document.getElementById("sotuvGrid");if(!rows.length){g.innerHTML="<div class='empty' style='grid-column:1/-1'>Mavjud mahsulot yoq</div>";return;}g.innerHTML=rows.map(p=>"<div class='sotuv-card' onclick='addToCart("+p.id+")'><div class='sc-name'>"+p.name+"</div><div class='sc-cat'>"+p.cat+"</div><div class='sc-price'>"+fmt(p.price)+"</div><div class='sc-qty'>Qoldi: "+p.qty+" dona</div></div>").join("");}function addToCart(id){var p=products.find(x=>x.id===id);if(!p||p.qty<=0)return;var ci=cart.find(x=>x.id===id);if(ci){if(ci.qty>=p.qty)return;ci.qty++;}else{cart.push({id:p.id,name:p.name,price:p.price,qty:1,max:p.qty});}renderCart();}function changeQty(id,d){var ci=cart.find(x=>x.id===id);if(!ci)return;ci.qty+=d;if(ci.qty<=0)cart=cart.filter(x=>x.id!==id);renderCart();}function renderCart(){var wrap=document.getElementById("cartWrap");if(!cart.length){wrap.style.display="none";return;}wrap.style.display="block";var total=cart.reduce((s,i)=>s+i.price*i.qty,0);document.getElementById("cartItems").innerHTML=cart.map(ci=>"<div class='cart-item'><span class='cart-item-name'>"+ci.name+"</span><div class='cart-item-qty'><button class='qty-btn' onclick='changeQty("+ci.id+",-1)'>-</button><span style='min-width:20px;text-align:center'>"+ci.qty+"</span><button class='qty-btn' onclick='changeQty("+ci.id+",1)'>+</button></div><span class='cart-item-price'>"+fmt(ci.price*ci.qty)+"</span></div>").join("");document.getElementById("cartTotal").textContent=fmt(total);}function openChek(){if(!cart.length)return;var total=cart.reduce((s,i)=>s+i.price*i.qty,0),now=new Date(),ds=now.toLocaleDateString("uz-UZ")+" "+now.toLocaleTimeString("uz-UZ",{hour:"2-digit",minute:"2-digit"});document.getElementById("chekContent").innerHTML="<div class='chek-logo'>LUX<span>HOME</span></div><div class='chek-date'>"+ds+"</div><hr class='chek-divider'>"+cart.map(ci=>"<div class='chek-row'><span>"+ci.name+" x"+ci.qty+"</span><span>"+fmt(ci.price*ci.qty)+"</span></div>").join("")+"<hr class='chek-divider'><div class='chek-total-row'><span>JAMI:</span><span>"+fmt(total)+"</span></div><hr class='chek-divider'><div style='text-align:center;font-size:11px;color:var(--text-muted);margin-top:.5rem'>Rahmat! Qayta keling!</div>";document.getElementById("chekOverlay").style.display="flex";confirmSale(total);}async function confirmSale(total){var items=cart.map(ci=>({id:ci.id,name:ci.name,qty:ci.qty,price:ci.price}));await api("POST","sales",{items:JSON.stringify(items),total});for(var ci of cart){var p=products.find(x=>x.id===ci.id);if(p)await api("PATCH","products?id=eq."+ci.id,{qty:p.qty-ci.qty});}cart=[];await loadProducts();}function closeChek(){document.getElementById("chekOverlay").style.display="none";}function chekClick(e){if(e.target===document.getElementById("chekOverlay"))closeChek();}async function loadTodayStats(){var today=new Date().toISOString().split("T")[0];var d=await api("GET","sales?created_at=gte."+today+"T00:00:00&select=total");if(Array.isArray(d)){document.getElementById("sotuvStat").textContent=d.length;document.getElementById("sotuvSum").textContent=d.reduce((s,x)=>s+(x.total||0),0).toLocaleString();}}async function loadTarix(){var d=await api("GET","sales?select=*&order=created_at.desc&limit=50"),el=document.getElementById("tarixList");if(!Array.isArray(d)||!d.length){el.innerHTML="<div class='empty'>Sotuv tarixi yoq</div>";return;}el.innerHTML=d.map(s=>{var items=[];try{items=JSON.parse(s.items);}catch(e){}var dt=new Date(s.created_at),ds=dt.toLocaleDateString("uz-UZ")+" "+dt.toLocaleTimeString("uz-UZ",{hour:"2-digit",minute:"2-digit"});return"<div class='tarix-item'><div class='tarix-header'><span class='tarix-date'>"+ds+"</span><span class='tarix-total'>"+fmt(s.total)+"</span></div><div class='tarix-items'>"+items.map(i=>i.name+" x"+i.qty).join(", ")+"</div></div>";}).join("");}document.addEventListener("keydown",function(e){if(e.key==="Escape"){closeModal();closeChek();}if(e.key==="Enter"&&document.getElementById("loginWrap").style.display!=="none")doLogin();});function showPage(id,btn){document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));document.getElementById(id).classList.add("active");btn.classList.add("active");if(id==="sotuv")renderSotuvGrid();if(id==="tarix")loadTarix();}if(token)showApp();if("serviceWorker"in navigator)navigator.serviceWorker.register("/sw.js");</script></body></html>test123
